version: 2
updates:
  # Cargo — current active major (main = 3.x)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "cargo"

  # Cargo — LTS branches (duplicate and uncomment when a new major is released)
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "v2.x"
    schedule:
      interval: "monthly"
      day: "monday"
    labels:
      - "dependencies"
      - "cargo"

  # GitHub Actions — current active branch only
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
