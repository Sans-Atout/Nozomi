name: Bug report
description: Report unexpected behavior in the library
title: "[BUG]: "
labels:
  - bug
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am using a supported version (2.x or 3.x)
          required: true

  - type: dropdown
    id: version
    attributes:
      label: Library version
      description: Which version of Nozomi are you using?
      options:
        - "3.x (current stable)"
        - "2.x (LTS)"
        - "1.x (unsupported — best effort)"
        - "Other / pre-release"
    validations:
      required: true

  - type: checkboxes
    id: features
    attributes:
      label: Cargo features enabled
      description: Which features did you enable in `Cargo.toml`?
      options:
        - label: "`dry-run`"
        - label: "`verify`"
        - label: "`analyze`"
        - label: "`log`"
        - label: "`secure_log`"
        - label: "`error-stack`"
        - label: None (default build)

  - type: dropdown
    id: method
    attributes:
      label: Overwrite method used
      options:
        - PseudoRandom (default)
        - Gutmann (35 passes)
        - DoD 5220.22-M ECE (7 passes)
        - DoD 5220.22-M ME (3 passes)
        - AFSSI 5020 (3 passes)
        - RCMP TSSIT OPS-II (7 passes)
        - HMGI S5 (2 passes)
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: target_type
    attributes:
      label: Deletion target
      options:
        - File
        - Directory
        - Both
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Arch Linux 6.12, Ubuntu 24.04, macOS 14.5, Windows 11"
    validations:
      required: true

  - type: input
    id: drive_type
    attributes:
      label: Storage type
      placeholder: "SSD / HDD / NVMe / RAM disk / network share"
    validations:
      required: true

  - type: input
    id: file_type
    attributes:
      label: File type
      placeholder: "e.g. mp4, sqlite, txt"
    validations:
      required: true

  - type: input
    id: file_size
    attributes:
      label: File size
      placeholder: "e.g. 4 KB, 2 GB"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error message / stack trace
      description: Paste the full error output if any.
      render: text

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal, numbered steps to trigger the bug.
      placeholder: |
        1. Create a file with ...
        2. Call `Method::Gutmann.delete(...)` with ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: snippet
    attributes:
      label: Minimal reproducible example
      description: A short Rust snippet that demonstrates the issue.
      render: rust
      placeholder: |
        use nozomi::{Method, DeleteRequest};

        fn main() {
            // ...
        }

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Filesystem permissions, unusual mount options, concurrent access, etc.
